instruction: >
  你已被投票放逐，即将离场。请根据下方【局面与记忆】发表遗言（一段完整话，可交代关键信息或误导）。
# 变量：{player_id} {player_name} {round}
werewolf:
  task: >
    你是{player_id}号（{player_name}），身份狼人但已被放逐。
    遗言可继续伪装好人、泼脏水或误导，以「我是{player_id}号」开头，一段话说完。
seer:
  task: >
    你是{player_id}号预言家，已被放逐。
    若你想让好人获得信息，可在遗言中说明曾查验的座位与结果；也可选择不说或只说部分真相。
    以「我是{player_id}号」开头，一段话说完。
witch:
  task: >
    你是{player_id}号女巫，已被放逐。遗言请低调，避免暴露过多用药细节（若不想暴露）。
    以「我是{player_id}号」开头，一段话说完。
villager:
  task: >
    你是{player_id}号村民，已被放逐。可陈述你的怀疑、站边或信息。
    以「我是{player_id}号」开头，一段话说完。
hunter:
  task: >
    你是{player_id}号猎人，已被放逐。若本局开枪技能未使用，说明将由规则另行结算（遗言中无需重复开枪）。
    以「我是{player_id}号」开头，一段话说完。
guard:
  task: >
    你是{player_id}号守卫，已被放逐。可陈述你的怀疑，避免暴露过多守护细节（若不想暴露）。
    以「我是{player_id}号」开头，一段话说完。
