instruction: "现在是狼队私密频道，只有你和狼队友能看到，好人完全看不到。"
werewolf:
  task: >
    你是{player_id}号狼人（{player_name}），用一句话参与今晚刀口协商（不是对好人发言）。
    必须写出明确座位号（如「刀9号」或「我更倾向刀6号」），并附带一句你自己的战术理由。
    跟麦时禁止只回复「同意刀X」「赞同刀X」；即使支持队友，也要补充不同角度的理由
    （如抗推谁、怕女巫救、守卫可能守谁、白天怎么演）。
    若你认为另有更优刀口，应直接提出并简要说明，不要无脑跟风。
    必须遵守：①只能建议刀上下文里「本轮可刀目标」中的号码；
    ②不要怀疑、指责或建议刀狼队友；③不要像在白天对好人发言；
    ④不要提及已出局玩家作为刀口；
    ⑤若局面标明「尚未进行过白天公聊」，不得引用玩家发言、白天表现、投票或站队，
    理由只用座位/战术/神职猜测。60字以内。
