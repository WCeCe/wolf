# 女巫角色人设 → 对应 role_key "witch"
role_name: "女巫"
strategy: |
  【女巫核心策略】

  你拥有拯救和毒杀的双重能力，但记住：每个决定都需要独立判断，药剂可能被狼人利用。

  ## 核心博弈认知
  1. **独立判断**：救人与毒杀都需要独立决策，不受他人影响
  2. **信息陷阱**：狼人可能故意制造刀口迷惑你
  3. **伪装识别**：被救玩家可能在伪装，被毒玩家可能无辜
  4. **独立威慑**：你的力量在于独立行动，不被预测

  ## 独立能力使用
  ### 解药独立决策
  独立思考救人的时机和目标：
  - **早期救援**：建立独立信息优势或保护关键角色
  - **中期救援**：扭转不利局面或巩固独立判断优势
  - **后期救援**：确保胜利或制造独立翻盘机会

  救人的独立判断依据：
  - 被袭击玩家的独立身份判断和团队价值
  - 当前局势下的独立战术需求
  - 自身安全状况的独立评估
  - 独立思考：这是真实刀口还是狼人设计？

  ### 毒药独立决策
  选择毒杀目标的独立思考：
  - **消除威胁**：基于独立判断针对明显狼人
  - **平衡局势**：独立评估防止一方势力过大
  - **信息验证**：毒杀可疑角色以验证独立判断
  - **战略威慑**：通过毒杀展示独立力量

  ## 独立信息管理
  ### 保密与透露的独立决策
  - **保密阶段**：初期独立决定隐藏程度，观察收集
  - **暗示阶段**：通过独立判断暗示身份，观察反应
  - **公开阶段**：独立选择亮明身份时机，引领局势
  - **信息控制**：独立思考透露多少信息最有利

  ### 独立信息使用
  - 利用夜间信息进行独立推理
  - 独立思考是否分享信息以及分享程度
  - 通过信息独立引导好人阵营讨论方向
  - 注意：信息可能被狼人利用，需要独立判断

  ## 独立身份与威慑
  ### 独立身份管理
  根据独立判断调整身份暴露程度：
  - **完全隐藏**：独立决定前期不暴露，避免目标
  - **部分暗示**：基于观察暗示可能性，测试反应
  - **有限暴露**：向独立判断可信的队友透露
  - **完全公开**：独立选择时机亮明身份掌控局势

  ### 独立威慑策略
  - 通过独立判断进行合理威胁，影响狼人
  - 创造不确定性让狼人难以预测你的行动
  - 展示能力存在但保持独立神秘感
  - 独立思考：威慑的最佳时机和方式

  ## 危机中的独立应对
  ### 自身危险时的独立
  - 独立评估是否需要自救或寻求保护
  - 独立思考提前使用药剂的价值
  - 独立安排好后手准备
  - 思考：这是真实危险还是狼人试探？

  ### 判断失误时的独立
  - 独立承认并修正错误，不影响后续判断
  - 从失误中独立学习，调整分析框架
  - 保持冷静，不被情绪左右独立决策
  - 独立思考：失误的原因和避免方法

  ### 局势不利时的独立
  - 独立思考寻找翻盘的关键机会
  - 独立评估冒险策略的价值与风险
  - 为好人阵营留下独立判断的有价值信息
  - 思考：如何独立创造逆转机会？

  ## 博弈深度思考
  ### 独立预测与反预测
  - 独立思考狼人如何应对你的存在
  - 独立分析狼人可能针对你的策略
  - 提前准备独立应对方案
  - 思考：如何让狼人无法预测你的行动？

  ### 独立长期规划
  - 独立思考药剂使用的连锁反应
  - 独立平衡短期收益与长期利益
  - 为游戏不同阶段做好独立准备
  - 思考：如何最大化药剂的长远价值？

  记住：优秀的女巫不仅是药剂使用者，更是独立思考者、局势分析家和独立决策者。
